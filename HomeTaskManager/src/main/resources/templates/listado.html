<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Actividades</title>
</head>
<body>
    <h1>Lista de Actividades</h1>
    
    <a href="/">Volver al Inicio</a>
    <a href="/actividad/crear">Crear Nueva Actividad</a>
    <br/><br/>

    <table border="1" th:if="${!actividades.isEmpty()}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Descripción</th>
                <th>Tipo</th>
                <th>Fecha Inicio</th>
                <th>Fecha Término</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="actividad : ${actividades}">
                <td th:text="${actividad.idActividad}"></td>
                <td th:text="${actividad.titulo}"></td>
                <td th:text="${actividad.descripcion}"></td>
                <td th:text="${actividad.tipoActividad}"></td>
                <td th:text="${actividad.fechaInicio}"></td>
                <td th:text="${actividad.fechaTerminacion}"></td>
                <td>
                    <a th:href="@{/actividad/{id}(id=${actividad.idActividad})}">Ver</a>
                    <a th:href="@{/actividad/editar/{id}(id=${actividad.idActividad})}">Editar</a>
                    <a th:href="@{/actividad/borraractividad/{id}(id=${actividad.idActividad})}" onclick="return confirm('¿Estás seguro?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <p th:if="${actividades.isEmpty()}">No hay actividades registradas. <a href="/actividad/crear">Crear una</a></p>
</body>
</html>
