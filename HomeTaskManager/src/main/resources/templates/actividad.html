<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Actividad</title>
</head>
<body>
    <h1>Consultar Actividad</h1>
    
    <p><strong>ID:</strong> <span th:text="${actividad.idActividad}"></span></p>
    <p><strong>Título:</strong> <span th:text="${actividad.titulo}"></span></p>
    <p><strong>Descripción:</strong> <span th:text="${actividad.descripcion}"></span></p>
    <p><strong>Tipo de Actividad:</strong> <span th:text="${actividad.tipoActividad}"></span></p>
    <p><strong>Fecha Inicio:</strong> <span th:text="${actividad.fechaInicio}"></span></p>
    <p><strong>Fecha Terminación:</strong> <span th:text="${actividad.fechaTerminacion}"></span></p>
    <p><strong>ID Quehacer:</strong> <span th:text="${actividad.idQuehacer}"></span></p>
    <p><strong>ID Tutor:</strong> <span th:text="${actividad.idTutor}"></span></p>
    <p><strong>ID Hijo a Cargo:</strong> <span th:text="${actividad.idHijoAcargo}"></span></p>

    <a href="/actividad/actividades">Volver</a>
    <a th:href="@{/actividad/editar/{id}(id=${actividad.idActividad})}">Editar</a>
    <a th:href="@{/actividad/borraractividad/{id}(id=${actividad.idActividad})}" onclick="return confirm('¿Estás seguro?')">Eliminar</a>
</body>
</html>
